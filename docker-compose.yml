services:
    por-core:
        image: por-core
        container_name: por-core
        network_mode: host
        build:
            context: .
            dockerfile: ./docker/core/Dockerfile
            ssh:
                - default
            args:
                - PYTHON_VERSION
                - UV_VERSION
        volumes:
            - $PWD/resources:/resources
        env_file:
            - .env
            - .secrets/.env
        privileged: true

    por-redis:
        image: redis:8.0.1
        container_name: por-redis
        network_mode: host
        volumes:
            - $PWD/resources/cache/redis:/data
        restart: unless-stopped

    por-qdrant:
        image: qdrant/qdrant:v1.14.0
        container_name: por-qdrant
        network_mode: host
        volumes:
            - ./resources/db/qdrant:/qdrant/storage
        restart: unless-stopped

    por-app:
        image: por-app
        container_name: por-app
        network_mode: host
        build:
            context: .
            dockerfile: ./docker/app/Dockerfile
        volumes:
            - $PWD/resources:/resources
            - /run/udev:/run/udev:ro
        env_file:
            - .env
            - .secrets/.env
        privileged: true
        restart: unless-stopped
