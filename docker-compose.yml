services:
    por-core:
        image: por-core
        container_name: por-core
        build:
            context: .
            dockerfile: ./docker/core/Dockerfile
            args:
                DEGIRUM_CLOUD_TOKEN: ${DEGIRUM_CLOUD_TOKEN}
        volumes:
            - $PWD/resources:/resources
        env_file:
            - .env
        privileged: true
        networks:
            - por

    por-redis:
        image: redis:8.4.0
        container_name: por-redis
        volumes:
            - $PWD/resources/cache/redis:/data
        restart: unless-stopped
        networks:
            - por

    por-qdrant:
        image: qdrant/qdrant:v1.17.1
        container_name: por-qdrant
        ports:
            - "6333:6333"
            - "6334:6334"
        volumes:
            - ./resources/db/qdrant:/qdrant/storage
        restart: unless-stopped
        networks:
            - por

    por-app:
        image: por-app
        container_name: por-app
        build:
            context: .
            dockerfile: ./docker/app/Dockerfile
        volumes:
            - $PWD/resources:/resources
            - /run/udev:/run/udev:ro
        env_file:
            - .env
        privileged: true
        restart: unless-stopped
        networks:
            - por

networks:
    por:
        name: por
        driver: bridge
