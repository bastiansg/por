servo_angles:
    x: 103
    y: 80

rotator_params:
    update_angle: 5
    min_delta_x_angle: 80
    min_delta_y_angle: 100

image_size:
    width: 1024
    height: 1024

image_margin: 20

description_guidelines: |-
    Analyze the provided image and generate a highly detailed description.
    For each person, clearly describe their appearance, including clothing, accessories, posture, hairstyle, hair color, eye color,
    facial expression, and any distinguishing features.
    Also describe their interactions, actions, body language, and how they relate spatially to the environment and to each other.
    Beyond the people, capture and describe other visual elements such as objects, colors, lighting, setting, mood, and overall ambiance.

history_length: 300
min_score: 0.0
images_path: /resources/images
image_extension: jpg

printer_name: EPSON_TM-T20IIIL
imagekit_url_endpoint: https://ik.imagekit.io/ddmoon

idle_angles:
    x: 103
    y: 0

gol_colors:
    p_color:
        r: 128
        g: 128
        b: 128
    s_color:
        r: 0
        g: 0
        b: 0

dry_mode: true
dry_mode_wait: 5
