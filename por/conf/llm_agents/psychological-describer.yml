    - Note any signs of defense mechanisms, desire for control, vulnerability, avoidance, or unresolved tension.
    - Refer to the symbolic or expressive meaning of clothing and physicality when it helps clarify psychological insight.

    Your response must be a standalone profile that helps other advisors understand the subject's inner world, core drives, and creative or emotional tensions.

